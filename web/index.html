<!DOCTYPE html>
<html>
<head>
  <base href="$FLUTTER_BASE_HREF">
  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="भक्ति साधना — पूजा, आरती, मंत्र, व्रत">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="भक्ति साधना">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">
  <link rel="icon" type="image/png" href="favicon.png"/>
  <title>भक्ति साधना</title>
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <script>
    (function () {
      var BELL_PATHS = [
        'assets/assets/sounds/temple_bell.mp3',
        'assets/sounds/temple_bell.mp3'
      ];

      window.playMandirBell = async function () {
        for (var i = 0; i < BELL_PATHS.length; i++) {
          try {
            var res = await fetch(BELL_PATHS[i]);
            if (!res.ok) continue;
            var buf = await res.arrayBuffer();
            var blob = new Blob([buf], { type: 'audio/mpeg' });
            var url = URL.createObjectURL(blob);
            var audio = new Audio(url);
            audio.volume = 1.0;
            await audio.play();
            return true;
          } catch (e) {
            console.warn('mandir bell try failed:', BELL_PATHS[i], e);
          }
        }
        return false;
      };

      window._mandirLoopAudio = { aarti: null, shankh: null };

      function mandirMp3Paths(file) {
        return [
          'assets/assets/sounds/' + file,
          'assets/sounds/' + file
        ];
      }

      async function startMandirLoop(key, file) {
        var slot = window._mandirLoopAudio[key];
        if (slot) {
          slot.pause();
          window._mandirLoopAudio[key] = null;
        }
        for (var i = 0; i < mandirMp3Paths(file).length; i++) {
          var path = mandirMp3Paths(file)[i];
          try {
            var res = await fetch(path);
            if (!res.ok) continue;
            var buf = await res.arrayBuffer();
            var blob = new Blob([buf], { type: 'audio/mpeg' });
            var url = URL.createObjectURL(blob);
            var audio = new Audio(url);
            audio.loop = true;
            audio.volume = 1.0;
            window._mandirLoopAudio[key] = audio;
            await audio.play();
            return true;
          } catch (e) {
            console.warn('mandir loop failed:', path, e);
          }
        }
        return false;
      }

      window.startMandirAartiLoop = function () {
        window.stopMandirShankh();
        return startMandirLoop('aarti', 'mandir_aarti.mp3');
      };

      window.startMandirShankhLoop = function () {
        window.stopMandirAarti();
        return startMandirLoop('shankh', 'mandir_shankh.mp3');
      };

      window.stopMandirAarti = function () {
        var a = window._mandirLoopAudio.aarti;
        if (a) {
          a.pause();
          a.currentTime = 0;
        }
        window._mandirLoopAudio.aarti = null;
      };

      window.stopMandirShankh = function () {
        var a = window._mandirLoopAudio.shankh;
        if (a) {
          a.pause();
          a.currentTime = 0;
        }
        window._mandirLoopAudio.shankh = null;
      };

    })();
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
